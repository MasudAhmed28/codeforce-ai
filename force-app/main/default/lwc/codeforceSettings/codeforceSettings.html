<template>
    <!-- ── Header ── -->
    <div class="header-bar">
        <div class="header-content">
            <lightning-icon icon-name="utility:settings" size="medium"></lightning-icon>
            <div class="header-text">
                <h1>CodeForce AI — Settings</h1>
                <p>Configure your AI provider, model, and API key</p>
            </div>
        </div>
    </div>

    <div class="settings-container">
        <!-- ── Configuration Card ── -->
        <div class="config-card">
            <h2>AI Provider Configuration</h2>

            <div class="form-row">
                <lightning-combobox
                    label="API Format"
                    value={provider}
                    options={providerOptions}
                    onchange={handleProviderChange}
                    class="form-field">
                </lightning-combobox>

                <lightning-input
                    label="Base URL"
                    value={baseUrl}
                    onchange={handleBaseUrlChange}
                    placeholder="https://api.openai.com"
                    class="form-field form-field-wide">
                </lightning-input>
            </div>

            <div class="form-row">
                <lightning-input
                    label="Model Name"
                    value={model}
                    onchange={handleModelChange}
                    placeholder="e.g. gemini-2.5-flash, gpt-4o, deepseek-coder"
                    class="form-field">
                </lightning-input>

                <lightning-input
                    label="API Key"
                    type="password"
                    value={apiKey}
                    onchange={handleApiKeyChange}
                    placeholder={apiKeyPlaceholder}
                    class="form-field">
                </lightning-input>
            </div>

            <div class="action-bar">
                <lightning-button
                    variant="brand"
                    label={saveButtonLabel}
                    onclick={handleSave}
                    disabled={isSaving}
                    icon-name="utility:save">
                </lightning-button>
                <lightning-button
                    variant="neutral"
                    label={testButtonLabel}
                    onclick={handleTestConnection}
                    disabled={isTesting}
                    icon-name="utility:refresh">
                </lightning-button>
            </div>

            <!-- Status banners -->
            <template lwc:if={showSuccess}>
                <div class="status-banner status-ok">
                    <lightning-icon icon-name="utility:success" variant="inverse" size="small"></lightning-icon>
                    <span>{statusMessage}</span>
                </div>
            </template>

            <template lwc:if={showError}>
                <div class="status-banner status-error">
                    <lightning-icon icon-name="utility:error" variant="inverse" size="small"></lightning-icon>
                    <span>{statusMessage}</span>
                </div>
            </template>
        </div>

        <!-- ── Quick Start Guide ── -->
        <div class="setup-card">
            <h2>Quick Start</h2>
            <div class="steps">
                <div class="step">
                    <div class="step-number">1</div>
                    <div class="step-content">
                        <h3>Choose Your AI Provider</h3>
                        <p>
                            Select <strong>Gemini</strong> for Google's API, or <strong>OpenAI Compatible</strong>
                            for OpenAI, DeepSeek, Groq, Mistral, Together AI, or any provider
                            that supports the <code>/v1/chat/completions</code> format.
                        </p>
                    </div>
                </div>

                <div class="step">
                    <div class="step-number">2</div>
                    <div class="step-content">
                        <h3>Get Your API Key</h3>
                        <p>
                            <strong>Gemini:</strong> Get a free key at
                            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer">Google AI Studio</a>.
                            <br/>
                            <strong>OpenAI:</strong> Get a key at
                            <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener noreferrer">OpenAI Platform</a>.
                            <br/>
                            <strong>Others:</strong> Use the API key from your chosen provider.
                        </p>
                    </div>
                </div>

                <div class="step">
                    <div class="step-number">3</div>
                    <div class="step-content">
                        <h3>Save &amp; Test</h3>
                        <p>
                            Paste your API key, choose a model, click <strong>Save</strong>,
                            then click <strong>Test Connection</strong> to verify.
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Supported Providers ── -->
        <div class="info-card">
            <lightning-icon icon-name="utility:info_alt" size="small"></lightning-icon>
            <div class="info-content">
                <strong>Supported Providers</strong>
                <p>
                    <strong>Gemini format:</strong> Google Gemini (all models — gemini-2.5-flash, gemini-2.5-pro, etc.)
                    <br/>
                    <strong>OpenAI Compatible format:</strong> OpenAI (gpt-4o, gpt-4.1), DeepSeek (deepseek-coder, deepseek-chat),
                    Groq (llama-3.3-70b), Mistral (mistral-large), Together AI, and any provider that implements
                    the OpenAI chat completions API. Just change the Base URL to point to your provider.
                </p>
            </div>
        </div>
    </div>
</template>
